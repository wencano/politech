<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Politech — Reactivity</title>
    <!-- Trunk: build politech_app (lib) for WASM with client feature -->
    <link
      data-trunk
      rel="rust"
      href="Cargo.toml"
      data-target-name="politech_app"
      data-cargo-features="client"
      data-cargo-no-default-features
      data-wasm-opt="0"
    />
    <!-- Call the Rust WASM main() after Trunk loads the module (lib target does not auto-run main) -->
    <script type="module">
      addEventListener('TrunkApplicationStarted', (e) => { e.detail?.wasm?.main?.(); });
    </script>
    <!-- Leaflet for map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js" crossorigin=""></script>
    <script src="/public/map.js"></script>
    <script src="/public/charts.js"></script>
    <!-- Shared styles -->
    <link rel="stylesheet" href="/public/styles.css" />
    <link rel="stylesheet" href="/public/app.css" />
  </head>
  <body></body>
</html>
